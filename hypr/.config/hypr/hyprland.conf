# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model = pc104
    kb_options = caps:super, altwin:swap_alt_win
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

}

# ░█░█░█▀▀░█░█░█▀▄░▀█▀░█▀█░█▀▄░█▀▀░░░░
# ░█▀▄░█▀▀░░█░░█▀▄░░█░░█░█░█░█░▀▀█░░▀░
# ░▀░▀░▀▀▀░░▀░░▀▀░░▀▀▀░▀░▀░▀▀░░▀▀▀░░▀░

 $mainMod = SUPER # set wink as main modifier (which has been swapped to alt and caps)

 # programs
 bind = $mainMod, A, exec, $terminal
 bind = $mainMod, E, exec, $fileManager
 bind = $mainMod, R, exec, $terminal --hold -e $ranger
 bind = $mainMod, B, exec, $browser
 bind = $mainMod, W, exec, $browser
 bind = $mainMod, P, exec, $ffp
 bind = $mainMod, S, exec, $spotify
 bind = $mainMod, N, exec, $neonav
 bind = $mainMod, L, exec, neovide


 # window management
 bind = $mainMod, space, togglefloating
 bind = $mainMod, space, centerwindow
 bind = $mainMod,   J,   togglesplit
 bind = $mainMod,   V,   fullscreen
 bind = $mainMod,   C,   killactive

 # screenshot
 bind = $mainMod SHIFT, S, exec, $screenshot

 # kando
 bind = CTRL, space, global, menu.kando.Kando:sao

 # ulauncher
 bind = $mainMod, Q, exec, $launcher

 # hide waybar
 bind = $mainMod, Z, exec, killall -SIGUSR1 .waybar-wrapped

 # show and hide desktop shortcuts
 bind = $mainMod, D, exec, pcmanfm-qt --desktop
 bind = $mainMod, H, exec, pcmanfm-qt --desktop-off

 # exit hyprland (commented out for now)
 #  bind = $mainMod, M, exit,

 # move window focus (mod + arrows)
 bind = $mainMod, left,  movefocus, l
 bind = $mainMod, right, movefocus, r
 bind = $mainMod, up,    movefocus, u
 bind = $mainMod, down,  movefocus, d

 # move windows (mod + arrows)
 bind = ALT, left,  movewindow, l
 bind = ALT, right, movewindow, r
 bind = ALT, up,    movewindow, u
 bind = ALT, down,  movewindow, d

 # change workspaces with numbers
 bind = $mainMod,  1, workspace,  1
 bind = $mainMod,  2, workspace,  2
 bind = $mainMod,  3, workspace,  3
 bind = $mainMod,  4, workspace,  4
 bind = $mainMod,  5, workspace,  5
 bind = $mainMod,  6, workspace,  6
 bind = $mainMod,  7, workspace,  7
 bind = $mainMod,  8, workspace,  8
 bind = $mainMod,  9, workspace,  9

 # change workspaces and move windows with numbers
 bind = $mainMod+Shift,  1, movetoworkspace,  1
 bind = $mainMod+Shift,  2, movetoworkspace,  2
 bind = $mainMod+Shift,  3, movetoworkspace,  3
 bind = $mainMod+Shift,  4, movetoworkspace,  4
 bind = $mainMod+Shift,  5, movetoworkspace,  5
 bind = $mainMod+Shift,  6, movetoworkspace,  6
 bind = $mainMod+Shift,  7, movetoworkspace,  7
 bind = $mainMod+Shift,  8, movetoworkspace,  8
 bind = $mainMod+Shift,  9, movetoworkspace,  9

 # change workspaces with arrows
 bind = $mainMod+Shift, left,  workspace, -1
 bind = $mainMod+Shift, right, workspace, +1

 # change workspaces and bring windows with arrows
 bind = $mainMod+Shift, up,   movetoworkspace, +1
 bind = $mainMod+Shift, down, movetoworkspace, -1

 # special workspace (commented out for now)
 # bind = $mainMod, S, togglespecialworkspace, magic

 # alt tab pretty much
 bind = $mainMod, Tab, cyclenext,
 bind = $mainMod, Tab, bringactivetotop,  

 # music n media control
#  bind = CTRL, space, exec, playerctl play-pause
#  bind = CTRL, left,  exec, playerctl previous
#  bind = CTRL, right, exec, playerctl next
# binde = CTRL, up,    exec, playerctl volume 0.1+
# binde = CTRL, down,  exec, playerctl volume 0.1-

 # move and resize windows w mouse
 bindm = $mainMod, mouse:272, movewindow
 bindm = $mainMod, mouse:273, resizewindow
 bindm = $mainMod, mouse:276, movewindow
 bindm = $mainMod, mouse:275, resizewindow

 # change window opacity w mouse wheel ( mouse_up and mouse_down are inverted ¯\_(ツ)_/¯ )
 bind = $mainMod, mouse_down, exec, hyprctl dispatch setprop activewindow alphaoverride 1
 bind = $mainMod, mouse_down, exec, hyprctl dispatch setprop activewindow alphainactiveoverride 1
 bind = $mainMod, mouse_up,   exec, hyprctl dispatch setprop activewindow alphaoverride 0.8
 bind = $mainMod, mouse_up,   exec, hyprctl dispatch setprop activewindow alphainactiveoverride 0.6
 

